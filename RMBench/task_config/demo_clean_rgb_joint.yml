# RGB-Joint evaluation equivalent to demo_clean, without unused point-cloud IO.
render_freq: 0
episode_num: 55
use_seed: false
save_freq: 15
embodiment: [aloha-agilex]
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 1
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: false
data_type:
  rgb: true
  third_view: false
  depth: false
  pointcloud: false
  observer: false
  endpose: false
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: /home/sutai/data/
clear_cache_freq: 5
collect_data: false
# demo_clean enables video while disabling third_view, causing a first-step
# KeyError in RMBench take_action. Quantitative policy evaluation needs no video.
eval_video_log: false
